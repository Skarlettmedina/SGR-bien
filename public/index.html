<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index_style.css">
    <title>Document</title>
</head>
<body>
    <div id="slider-container">
        <div class="slider-track">
            <div class="slide">
                <img src="./assets/imagenes/1.jpeg" alt="Sala de Cómputo">

            </div>
            <div class="slide">
                <img src="./assets/imagenes/2.jpeg" alt="Auditorio">

            </div>

            </div>

            </div>
        </div>
    </div>
    <div id="cuerpo">

            <img src="./assets/icon/calendario.png" alt="" style="height: 50px; width: 50px; margin-top: 20px;">

            <button id="btn2">
